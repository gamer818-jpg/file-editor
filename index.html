<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Файловый редактор Pro</title>

<style>
/* Исходные переменные из вашего дизайна */
:root{
--bg:#f4f6fb;
--panel:#ffffff;
--accent:#4f7cff;
--accent2:#55c79a;
--border:#e4e9f1;
--text:#1f2a35;
--muted:#7a8896;
}

/* Темная тема */
[data-theme="dark"] {
--bg:#1a1d21;
--panel:#24292e;
--border:#30363d;
--text:#adbac7;
--muted:#768390;
}

/* Тема Solarized */
[data-theme="solar"] {
--bg:#fdf6e3;
--panel:#eee8d5;
--border:#dcd3b6;
--text:#586e75;
--muted:#93a1a1;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
}

body{
background:var(--bg);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:16px;
transition: background 0.3s;
}

.app{
width:100%;
max-width:1200px;
height:90vh;
background:var(--panel);
border-radius:20px;
box-shadow:0 25px 60px rgba(0,0,0,.08);
display:flex;
flex-direction:column;
overflow:hidden;
transition: background 0.3s;
}

.header{
background:linear-gradient(135deg,#34495e,#253445);
color:white;
padding:16px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header h1{
font-size:18px;
font-weight:500;
}

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
align-items: center;
}

select#themeSelect {
background: rgba(255,255,255,0.1);
color: white;
border: 1px solid rgba(255,255,255,0.2);
padding: 5px 10px;
border-radius: 15px;
font-size: 12px;
outline: none;
cursor: pointer;
}

button{
border:none;
padding:8px 16px;
border-radius:25px;
cursor:pointer;
font-size:13px;
background:#34495e;
color:white;
transition:.15s;
}

button:hover{
transform:translateY(-1px);
}

.primary{background:var(--accent);}
.download{background:var(--accent2);color:#083a2a;}
.warning{background:#e05b5b;}

.main{
flex:1;
display:flex;
overflow:hidden;
}

.sidebar{
width:260px;
border-right:1px solid var(--border);
display:flex;
flex-direction:column;
padding:14px;
}

.search input{
width:100%;
padding:8px 12px;
border-radius:20px;
border:1px solid var(--border);
font-size:13px;
margin-bottom:10px;
background: var(--bg);
color: var(--text);
}

.file-list{
list-style:none;
flex:1;
overflow:auto;
}

.file{
padding:10px 12px;
border-radius:10px;
margin-bottom:6px;
cursor:pointer;
display:flex;
justify-content:space-between;
font-size:13px;
color: var(--text);
}

.file:hover{background:rgba(0,0,0,0.05);}
.file.active{background:var(--accent); color: white;}

.editor{
flex:1;
display:flex;
flex-direction:column;
}

.editor-top{
padding:12px 18px;
border-bottom:1px solid var(--border);
display:flex;
justify-content:space-between;
background: var(--panel);
}

.filename{
font-family:monospace;
background:rgba(0,0,0,0.05);
padding:5px 12px;
border-radius:20px;
font-size:13px;
color: var(--text);
}

textarea{
flex:1;
border:none;
outline:none;
resize:none;
padding:20px;
font-family:Consolas,monospace;
font-size:14px;
line-height:1.6;
background: transparent;
color: var(--text);
}

.footer{
padding:10px 18px;
border-top:1px solid var(--border);
display:flex;
justify-content:space-between;
font-size:12px;
color:var(--muted);
background: var(--panel);
}

@media(max-width:720px){
.main{flex-direction:column}
.sidebar{width:100%;height:180px}
}

</style>
</head>

<body>

<div class="app">
    <div class="header">
        <h1>✎ Редактор файлов</h1>
        <div class="actions">
            <select id="themeSelect">
                <option value="light">Светлая</option>
                <option value="dark">Темная</option>
                <option value="solar">Solarized</option>
            </select>
            <button class="primary" id="newBtn">Новый</button>
            <button id="saveBtn">Сохранить</button>
            <button id="openBtn">Открыть</button>
            <button class="download" id="downloadBtn">Скачать</button>
            <button class="warning" id="deleteBtn">Удалить</button>
        </div>
    </div>

    <div class="main">
        <div class="sidebar">
            <div class="search">
                <input id="search" placeholder="Поиск файлов">
            </div>
            <ul class="file-list" id="files"></ul>
            <button class="primary" id="createSide">+ файл</button>
        </div>

        <div class="editor">
            <div class="editor-top">
                <div class="filename" id="filename">file.txt</div>
                <div id="stats" style="font-size: 11px; opacity: 0.7;">Слова: 0 | Строки: 0</div>
            </div>
            <textarea id="editor" spellcheck="false"></textarea>
            <div class="footer">
                <span id="count">0 символов</span>
                <span>автосохранение активно</span>
            </div>
        </div>
    </div>
</div>

<input type="file" id="fileInput" style="display:none">

<script>
const STORAGE = "editor_files_v2";
const THEME_KEY = "editor_theme_v2";

let files = JSON.parse(localStorage.getItem(STORAGE)) || [
    {name: "welcome.txt", content: "Добро пожаловать в обновленный редактор!"}
];

let current = 0;

const filesEl = document.getElementById("files");
const editor = document.getElementById("editor");
const filename = document.getElementById("filename");
const count = document.getElementById("count");
const stats = document.getElementById("stats");
const fileInput = document.getElementById("fileInput");
const themeSelect = document.getElementById("themeSelect");

function saveStorage() {
    localStorage.setItem(STORAGE, JSON.stringify(files));
}

function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem(THEME_KEY, theme);
}

function updateStats() {
    const text = editor.value.trim();
    const charCount = editor.value.length;
    const wordCount = text === "" ? 0 : text.split(/\s+/).length;
    const lineCount = editor.value.split('\n').length;
    
    count.textContent = charCount + " символов";
    stats.textContent = `Слова: ${wordCount} | Строки: ${lineCount}`;
}

function render() {
    filesEl.innerHTML = "";
    files.forEach((f, i) => {
        const li = document.createElement("li");
        li.className = "file" + (i === current ? " active" : "");
        li.innerHTML = `
            <span>${f.name}</span>
            <span style="opacity:.5">${f.content.length}</span>
        `;
        li.onclick = () => {
            files[current].content = editor.value; // Сохраняем текущий перед переходом
            current = i;
            render();
        };
        filesEl.appendChild(li);
    });
    update();
}

function update() {
    if (!files[current]) {
        if (files.length > 0) {
            current = 0;
        } else {
            files = [{name: "new.txt", content: ""}];
            current = 0;
        }
    }
    editor.value = files[current].content;
    filename.textContent = files[current].name;
    updateStats();
}

editor.addEventListener("input", () => {
    files[current].content = editor.value;
    updateStats();
    saveStorage();
});

themeSelect.onchange = (e) => setTheme(e.target.value);

document.getElementById("newBtn").onclick = () => {
    let name = prompt("Имя файла", "new.txt");
    if (!name) return;
    files.push({name, content: ""});
    current = files.length - 1;
    saveStorage();
    render();
};

document.getElementById("createSide").onclick = () => {
    document.getElementById("newBtn").click();
};

document.getElementById("saveBtn").onclick = () => {
    files[current].content = editor.value;
    saveStorage();
    alert("Файл сохранён в памяти браузера");
};

document.getElementById("deleteBtn").onclick = () => {
    if (files.length <= 1) {
        alert("Нельзя удалить последний файл");
        return;
    }
    if (!confirm("Удалить файл?")) return;
    files.splice(current, 1);
    current = 0;
    saveStorage();
    render();
};

document.getElementById("downloadBtn").onclick = () => {
    const text = editor.value;
    const blob = new Blob([text], {type: "text/plain"});
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = files[current].name;
    document.body.appendChild(link);
    link.click();
    link.remove();
};

document.getElementById("openBtn").onclick = () => {
    fileInput.click();
};

fileInput.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
        files.push({name: file.name, content: ev.target.result});
        current = files.length - 1;
        saveStorage();
        render();
    };
    reader.readAsText(file);
    e.target.value = ''; // Сброс для возможности повторного открытия
};

document.getElementById("search").addEventListener("input", e => {
    let q = e.target.value.toLowerCase();
    document.querySelectorAll(".file").forEach(el => {
        el.style.display = el.textContent.toLowerCase().includes(q) ? "flex" : "none";
    });
});

// Инициализация
const savedTheme = localStorage.getItem(THEME_KEY) || 'light';
themeSelect.value = savedTheme;
setTheme(savedTheme);
render();

</script>
</body>
</html>
