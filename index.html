<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Файловый редактор</title>

<style>

:root{
--bg:#f4f6fb;
--panel:#ffffff;
--accent:#4f7cff;
--accent2:#55c79a;
--border:#e4e9f1;
--text:#1f2a35;
--muted:#7a8896;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
}

body{
background:var(--bg);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:16px;
}

.app{
width:100%;
max-width:1200px;
height:90vh;
background:var(--panel);
border-radius:20px;
box-shadow:0 25px 60px rgba(0,0,0,.08);
display:flex;
flex-direction:column;
overflow:hidden;
}

.header{
background:linear-gradient(135deg,#34495e,#253445);
color:white;
padding:16px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header h1{
font-size:18px;
font-weight:500;
}

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
border:none;
padding:8px 16px;
border-radius:25px;
cursor:pointer;
font-size:13px;
background:#34495e;
color:white;
transition:.15s;
}

button:hover{
transform:translateY(-1px);
}

.primary{background:var(--accent);}
.download{background:var(--accent2);color:#083a2a;}
.warning{background:#e05b5b;}

.main{
flex:1;
display:flex;
overflow:hidden;
}

.sidebar{
width:260px;
border-right:1px solid var(--border);
display:flex;
flex-direction:column;
padding:14px;
}

.search input{
width:100%;
padding:8px 12px;
border-radius:20px;
border:1px solid var(--border);
font-size:13px;
margin-bottom:10px;
}

.file-list{
list-style:none;
flex:1;
overflow:auto;
}

.file{
padding:10px 12px;
border-radius:10px;
margin-bottom:6px;
cursor:pointer;
display:flex;
justify-content:space-between;
font-size:13px;
}

.file:hover{background:#f0f4fa;}
.file.active{background:#e8f0ff;}

.editor{
flex:1;
display:flex;
flex-direction:column;
}

.editor-top{
padding:12px 18px;
border-bottom:1px solid var(--border);
display:flex;
justify-content:space-between;
}

.filename{
font-family:monospace;
background:#eef2f7;
padding:5px 12px;
border-radius:20px;
font-size:13px;
}

textarea{
flex:1;
border:none;
outline:none;
resize:none;
padding:20px;
font-family:Consolas,monospace;
font-size:14px;
line-height:1.6;
}

.footer{
padding:10px 18px;
border-top:1px solid var(--border);
display:flex;
justify-content:space-between;
font-size:12px;
color:var(--muted);
}

@media(max-width:720px){
.main{flex-direction:column}
.sidebar{width:100%;height:180px}
}

</style>
</head>

<body>

<div class="app">

<div class="header">
<h1>✎ Редактор файлов</h1>

<div class="actions">

<button class="primary" id="newBtn">Новый</button>
<button id="saveBtn">Сохранить</button>
<button id="openBtn">Открыть</button>
<button class="download" id="downloadBtn">Скачать</button>
<button class="warning" id="deleteBtn">Удалить</button>

</div>
</div>


<div class="main">

<div class="sidebar">

<div class="search">
<input id="search" placeholder="Поиск файлов">
</div>

<ul class="file-list" id="files"></ul>

<button class="primary" id="createSide">+ файл</button>

</div>


<div class="editor">

<div class="editor-top">
<div class="filename" id="filename">file.txt</div>
</div>

<textarea id="editor"></textarea>

<div class="footer">
<span id="count">0 символов</span>
<span>автосохранение</span>
</div>

</div>

</div>

</div>

<input type="file" id="fileInput" style="display:none">

<script>

const STORAGE="editor_files";

let files=JSON.parse(localStorage.getItem(STORAGE))||[
{name:"welcome.txt",content:"Добро пожаловать в редактор."}
];

let current=0;

const filesEl=document.getElementById("files");
const editor=document.getElementById("editor");
const filename=document.getElementById("filename");
const count=document.getElementById("count");
const fileInput=document.getElementById("fileInput");

function saveStorage(){
localStorage.setItem(STORAGE,JSON.stringify(files));
}

function render(){

filesEl.innerHTML="";

files.forEach((f,i)=>{

const li=document.createElement("li");

li.className="file"+(i===current?" active":"");

li.innerHTML=`
<span>${f.name}</span>
<span style="opacity:.5">${f.content.length}</span>
`;

li.onclick=()=>{
files[current].content=editor.value;
current=i;
update();
};

filesEl.appendChild(li);

});

update();

}

function update(){

if(!files[current]) return;

editor.value=files[current].content;
filename.textContent=files[current].name;
count.textContent=editor.value.length+" символов";

}

editor.addEventListener("input",()=>{

count.textContent=editor.value.length+" символов";

files[current].content=editor.value;

saveStorage();

});

document.getElementById("newBtn").onclick=()=>{

let name=prompt("Имя файла","new.txt");

if(!name) return;

files.push({name,content:""});

current=files.length-1;

saveStorage();

render();

};

document.getElementById("createSide").onclick=()=>{
document.getElementById("newBtn").click();
};

document.getElementById("saveBtn").onclick=()=>{

files[current].content=editor.value;

saveStorage();

alert("Файл сохранён в приложении");

};

document.getElementById("deleteBtn").onclick=()=>{

if(!confirm("Удалить файл?")) return;

files.splice(current,1);

current=0;

saveStorage();

render();

};

document.getElementById("downloadBtn").onclick=()=>{

const text=editor.value;

const blob=new Blob([text],{type:"text/plain"});

const link=document.createElement("a");

link.href=URL.createObjectURL(blob);

link.download=filename.textContent;

document.body.appendChild(link);

link.click();

link.remove();

};

document.getElementById("openBtn").onclick=()=>{

fileInput.click();

};

fileInput.onchange=(e)=>{

const file=e.target.files[0];

if(!file) return;

const reader=new FileReader();

reader.onload=function(ev){

editor.value=ev.target.result;

filename.textContent=file.name;

count.textContent=editor.value.length+" символов";

};

reader.readAsText(file);

};

document.getElementById("search").addEventListener("input",e=>{

let q=e.target.value.toLowerCase();

document.querySelectorAll(".file").forEach(el=>{

el.style.display=el.textContent.toLowerCase().includes(q)?"flex":"none";

});

});

render();

</script>

</body>
  </html>
